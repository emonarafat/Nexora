services:
  # PostgreSQL for metadata (synonyms, ranking config, A/B tests)
  postgres:
    image: postgres:16-alpine
    container_name: nexora-postgres
    environment:
      POSTGRES_USER: nexora_user
      POSTGRES_PASSWORD: dev_password_change_in_prod
      POSTGRES_DB: nexora_metadata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-network

  # MSSQL Server for product catalog (source of truth)
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexora-mssql
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: "DevPassword123!"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "DevPassword123!", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-network

  # Typesense for full-text search
  typesense:
    image: typesense/typesense:27
    container_name: nexora-typesense
    environment:
      TYPESENSE_API_KEY: nexora_dev_key_change_in_prod
      TYPESENSE_DATA_DIR: /data
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-network

  # Valkey (Redis-compatible cache)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: nexora-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes --requirepass dev_cache_password
    healthcheck:
      test: ["CMD", "valkey-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-network

  # RabbitMQ for event streaming
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: nexora-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexora-network

  # React UI for Search + Admin surfaces
  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.UI
    container_name: nexora-ui
    ports:
      - "3000:80"
    depends_on:
      - typesense
      - postgres
      - mssql
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - nexora-network

volumes:
  postgres_data:
  mssql_data:
  typesense_data:
  valkey_data:
  rabbitmq_data:

networks:
  nexora-network:
    driver: bridge

# Usage:
# docker-compose -f docker-compose.local.yml up -d
# docker-compose -f docker-compose.local.yml down
# docker-compose -f docker-compose.local.yml logs -f [service-name]
#
# Connection Strings for .NET Application:
#
# PostgreSQL:
#   "Server=postgres;Port=5432;Database=nexora_metadata;User Id=nexora_user;Password=dev_password_change_in_prod;"
#
# MSSQL Server:
#   "Server=mssql;Initial Catalog=master;User Id=sa;Password=DevPassword123!;"
#
# Typesense:
#   http://typesense:8108
#   API Key: nexora_dev_key_change_in_prod
#
# Valkey:
#   redis://default:dev_cache_password@valkey:6379
#
# RabbitMQ:
#   amqp://guest:guest@rabbitmq:5672/
#   Management UI: http://localhost:15672 (guest/guest)
#
# UI:
#   http://localhost:3000
