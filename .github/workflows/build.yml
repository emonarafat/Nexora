name: Build and Test

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      checks: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Nexora.slnx

      - name: Build
        run: dotnet build Nexora.slnx --no-restore -c Release

      - name: Test
        run: |
          dotnet test Nexora.slnx \
            --no-build \
            -c Release \
            --verbosity normal \
            --results-directory ./test-results \
            --logger "trx;LogFileName=results.trx"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results

  docker-build:
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    needs: build-and-test

    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - SearchAPI
          - IndexSync
          - AdminAPI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          SERVICE_LOWER=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            -f docker/Dockerfile.${{ matrix.service }} \
            -t nexora/${SERVICE_LOWER}:${{ github.sha }} \
            .