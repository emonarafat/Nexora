name: Build and Test

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'

jobs:
  # ── .NET: restore → build → test ─────────────────────────────────────────
  dotnet-build-test:
    name: .NET Build & Test
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      checks: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Nexora.slnx

      - name: Build
        run: dotnet build Nexora.slnx --no-restore -c Release

      - name: Test
        run: |
          dotnet test Nexora.slnx \
            --no-build \
            -c Release \
            --verbosity normal \
            --results-directory ./test-results \
            --logger "trx;LogFileName=results.trx"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: ./test-results

  # ── UI: lint → typecheck → build ─────────────────────────────────────────
  ui-quality:
    name: UI Quality Gates (lint, typecheck, build)
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/Nexora.UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/Nexora.UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: src/Nexora.UI/dist
          retention-days: 1

  # ── UI: Playwright e2e ────────────────────────────────────────────────────
  ui-e2e:
    name: UI Playwright E2E
    runs-on: ubuntu-24.04
    needs: ui-quality

    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/Nexora.UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/Nexora.UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('src/Nexora.UI/package-lock.json') }}

      - name: Install Playwright browser + OS deps
        run: npx playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright OS deps (cache hit)
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: src/Nexora.UI/playwright-report
          retention-days: 7

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: src/Nexora.UI/test-results
          retention-days: 7

  # ── Security: Dependency & Container Scanning ─────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      security-events: write

    needs:
      - dotnet-build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'

      - name: Run Trivy vulnerability scanner (config files)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'

  # ── Docker: build images (main branch only) ───────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      security-events: write

    needs:
      - dotnet-build-test
      - ui-e2e
      - security-scan

    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - SearchAPI
          - IndexSync
          - AdminAPI
          - UI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        id: build
        run: |
          SERVICE_LOWER=$(echo "${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            -f docker/Dockerfile.${{ matrix.service }} \
            -t nexora/${SERVICE_LOWER}:${{ github.sha }} \
            .
          echo "service_lower=${SERVICE_LOWER}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner (container image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nexora/${{ steps.build.outputs.service_lower }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'
